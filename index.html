<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0F1215">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiftLab">
<title>LiftLab</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<body>
<title>LiftLab — Workout Tracker</title>
<style>
  :root{
    --bg:#0F1215; --card:#171B20; --raised:#1F252B; --line:rgba(255,255,255,.07);
    --ink:#F1F3F4; --ink2:#98A3AC; --ink3:#5E6A73;
    --brass:#F5A524; --brass-dim:rgba(245,165,36,.14);
    --chart-amber:#C98500; --chart-blue:#3987E5;
    --good:#2FB344; --good-dim:rgba(47,179,68,.14);
    --danger:#E5484D; --danger-dim:rgba(229,72,77,.12);
    --grid:#262C33; --r:14px;
  }
  html,body{background:var(--bg);margin:0;padding:0;}
  body{color:var(--ink);font:15px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
  *{box-sizing:border-box;}
  [hidden]{display:none!important;}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;}
  input,select{font:inherit;color:var(--ink);background:var(--raised);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;width:100%;}
  input:focus,select:focus{outline:2px solid var(--brass);outline-offset:-1px;border-color:transparent;}
  textarea{font:inherit;color:var(--ink);background:var(--raised);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;width:100%;resize:none;line-height:1.45;}
  textarea:focus{outline:2px solid var(--brass);outline-offset:-1px;border-color:transparent;}
  input[type=number]{font-variant-numeric:tabular-nums;-moz-appearance:textfield;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
  #view{flex:1;padding:calc(18px + env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom));}
  #app.noconsole #view{padding-bottom:24px;}

  /* type roles */
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);}
  h1.display{font-size:26px;font-weight:800;letter-spacing:-.03em;margin:2px 0 0;text-wrap:balance;}
  h2.display{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .num{font-variant-numeric:tabular-nums;}
  .muted{color:var(--ink2);} .tiny{font-size:12.5px;}

  /* header rows */
  .hrow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px;}
  .iconbtn{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--ink2);flex:none;}
  .iconbtn:active{background:var(--raised);}
  .iconbtn svg{width:20px;height:20px;}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;}
  .card.tap:active{background:var(--raised);}
  .stack{display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;gap:10px;}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:10px;}

  /* stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 12px 10px;}
  .tile .v{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .tile .u{font-size:12px;color:var(--ink2);margin-top:1px;}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;
    border-radius:13px;font-weight:700;font-size:16px;}
  .btn.primary{background:var(--brass);color:#1A1205;}
  .btn.primary:active{filter:brightness(.92);}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:active{background:var(--raised);}
  .btn.danger{background:var(--danger-dim);color:var(--danger);}
  .btn.sm{padding:10px 14px;font-size:14px;width:auto;border-radius:11px;}
  .btn[disabled]{opacity:.4;pointer-events:none;}

  /* chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chips.scroll{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .chips.scroll::-webkit-scrollbar{display:none;}
  .chip{padding:8px 14px;border-radius:999px;background:var(--card);border:1px solid var(--line);
    font-size:13.5px;font-weight:600;color:var(--ink2);white-space:nowrap;flex:none;}
  .chip.on{background:var(--brass-dim);border-color:var(--brass);color:var(--brass);}

  /* pick grids (builder) */
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pick{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;text-align:left;}
  .pick .t{font-weight:700;font-size:15px;}
  .pick .d{font-size:12.5px;color:var(--ink2);margin-top:3px;line-height:1.35;}
  .pick.on{border-color:var(--brass);background:var(--brass-dim);}
  .pick.on .t{color:var(--brass);}
  .pickgrid.one{grid-template-columns:1fr;}

  /* exercise list rows */
  .exrow{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;width:100%;text-align:left;}
  .exrow:active{background:var(--raised);}
  .exrow .nm{font-weight:650;}
  .exrow .sub{font-size:12.5px;color:var(--ink2);margin-top:1px;}
  .exrow .right{margin-left:auto;text-align:right;flex:none;}
  .exrow.sel{border-color:var(--brass);}
  .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink3);background:var(--raised);border-radius:6px;padding:2px 7px;}
  .addmark{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--ink3);flex:none;
    display:flex;align-items:center;justify-content:center;color:transparent;}
  .exrow.sel .addmark{background:var(--brass);border-color:var(--brass);color:#1A1205;}

  /* set rows in logger */
  .wex{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 14px 12px;margin-bottom:12px;}
  .wex .grp{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--brass);}
  .prevline{font-size:12.5px;color:var(--ink2);margin:4px 0 2px;font-variant-numeric:tabular-nums;}
  .rec{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--brass);
    background:var(--brass-dim);border-radius:8px;padding:3px 9px;margin:4px 0 10px;}
  .rec.neutral{color:var(--ink2);background:var(--raised);}
  .shead{display:grid;grid-template-columns:26px 1fr 1fr 46px;gap:8px;font-size:11px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:0 2px 6px;}
  .shead div:nth-child(2),.shead div:nth-child(3){text-align:center;}
  .srow{display:grid;grid-template-columns:26px 1fr 1fr 46px;gap:8px;align-items:center;margin-bottom:8px;}
  .srow .snum{font-size:13px;font-weight:700;color:var(--ink3);text-align:center;font-variant-numeric:tabular-nums;}
  .fld{display:flex;align-items:center;gap:4px;}
  .fld input{text-align:center;padding:10px 4px;min-width:0;font-weight:700;font-size:16px;}
  .step{width:30px;height:42px;flex:none;border-radius:9px;background:var(--raised);border:1px solid var(--line);
    color:var(--ink2);font-size:18px;font-weight:700;line-height:1;}
  .step:active{background:var(--grid);}
  .ck{width:46px;height:42px;border-radius:10px;border:1.5px solid var(--ink3);color:transparent;
    display:flex;align-items:center;justify-content:center;}
  .ck svg{width:20px;height:20px;}
  .srow.done .ck{background:var(--good);border-color:var(--good);color:#08210D;}
  .srow.done input{color:var(--ink2);}
  .setbtns{display:flex;gap:8px;margin-top:4px;}
  .setbtns .btn{padding:9px;font-size:13.5px;}

  /* workout sticky header */
  #whead{position:sticky;top:env(safe-area-inset-top,0px);z-index:5;background:linear-gradient(var(--bg) 78%,transparent);
    padding:12px 0 14px;display:flex;align-items:center;gap:10px;}
  #whead .mid{flex:1;min-width:0;}
  #whead .ttl{font-weight:800;font-size:16px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #whead .sub{font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums;}

  /* tab bar */
  #tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:20;
    display:grid;grid-template-columns:repeat(4,1fr);background:rgba(15,18,21,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0 4px;border-radius:12px;
    color:var(--ink3);font-size:10.5px;font-weight:700;letter-spacing:.04em;}
  .tab svg{width:22px;height:22px;}
  .tab.on{color:var(--brass);}
  #app.workout #tabbar{display:none;}

  /* rest pill */
  #restpill{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    z-index:25;display:flex;align-items:center;gap:10px;background:var(--raised);border:1px solid var(--brass);
    border-radius:999px;padding:8px 10px 8px 16px;box-shadow:0 8px 28px rgba(0,0,0,.5);}
  #app.workout #restpill{bottom:calc(18px + env(safe-area-inset-bottom));}
  #restpill .t{font-weight:800;font-size:17px;font-variant-numeric:tabular-nums;color:var(--brass);}
  #restpill button{background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:6px 11px;font-size:12.5px;font-weight:700;color:var(--ink2);}

  /* sheets */
  #sheetwrap{position:fixed;inset:0;z-index:40;}
  #sheetwrap .backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:opacity .22s;}
  #sheet{position:absolute;bottom:0;left:50%;transform:translate(-50%,102%);width:100%;max-width:480px;
    max-height:88dvh;overflow-y:auto;background:var(--bg);border:1px solid var(--line);border-bottom:0;
    border-radius:22px 22px 0 0;padding:10px 16px calc(22px + env(safe-area-inset-bottom));
    transition:transform .26s cubic-bezier(.32,.72,.22,1);}
  #sheetwrap.open .backdrop{opacity:1;}
  #sheetwrap.open #sheet{transform:translate(-50%,0);}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--grid);margin:4px auto 14px;}
  @media (prefers-reduced-motion:reduce){#sheet,#sheetwrap .backdrop{transition:none;}}

  /* charts */
  .chart{position:relative;margin-top:6px;}
  .chart svg{display:block;width:100%;height:auto;}
  .chart .ctip{position:absolute;pointer-events:none;background:var(--raised);border:1px solid var(--line);
    border-radius:9px;padding:6px 10px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap;
    transform:translate(-50%,-110%);box-shadow:0 6px 18px rgba(0,0,0,.45);z-index:3;}
  .chart .ctip .cv{font-weight:800;font-size:14px;}
  .chart-empty{color:var(--ink3);font-size:13px;text-align:center;padding:34px 0;}
  .seg{display:grid;grid-auto-flow:column;gap:4px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:4px;}
  .seg button{padding:8px 6px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink2);}
  .seg button.on{background:var(--raised);color:var(--ink);}

  /* history + calendar */
  .mhead{margin:20px 0 10px;}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .caldow div{text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink3);padding:2px 0 6px;}
  .cday{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-size:13px;font-variant-numeric:tabular-nums;color:var(--ink2);border:1px solid transparent;min-height:38px;}
  .cday:active{background:var(--raised);}
  .cday.has{background:var(--raised);color:var(--ink);font-weight:700;}
  .cday.today{border-color:var(--brass);color:var(--brass);font-weight:800;}
  .cday .dots{display:flex;gap:3px;height:5px;}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--brass);display:inline-block;}
  .dot.plan{background:none;border:1px solid var(--ink2);}
  input[type=date]{color-scheme:dark;min-width:0;}
  .prbadge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;
    color:var(--good);background:var(--good-dim);border-radius:7px;padding:2px 8px;}

  /* misc */
  .empty{color:var(--ink2);text-align:center;padding:40px 20px;font-size:14px;line-height:1.5;}
  .empty .big{font-size:34px;display:block;margin-bottom:8px;}
  #toast{position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    z-index:60;background:var(--raised);border:1px solid var(--line);color:var(--ink);border-radius:999px;
    padding:9px 18px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.5);
    opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--ink3);margin-bottom:6px;}
  .checks{display:flex;gap:8px;flex-wrap:wrap;}
  a{color:var(--brass);}
  :focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
</style>

<div id="app">
  <main id="view"></main>
  <nav id="tabbar" aria-label="Sections">
    <button class="tab on" data-action="tab" data-tab="home" id="tab-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
      Home</button>
    <button class="tab" data-action="tab" data-tab="exercises" id="tab-exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 7v10M17.5 7v10M3.5 9.5v5M20.5 9.5v5M6.5 12h11"/></svg>
      Exercises</button>
    <button class="tab" data-action="tab" data-tab="history" id="tab-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2.5"/></svg>
      History</button>
    <button class="tab" data-action="tab" data-tab="body" id="tab-body">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7.5" r="3.5"/><path d="M4.5 20.5c.8-4 3.8-6 7.5-6s6.7 2 7.5 6"/></svg>
      Body</button>
  </nav>
  <div id="restpill" hidden>
    <span class="t num" id="restt">1:30</span>
    <button data-action="rest-add">+30s</button>
    <button data-action="rest-stop" aria-label="Stop rest timer">✕</button>
  </div>
</div>
<div id="sheetwrap" hidden>
  <div class="backdrop" data-action="close-sheet"></div>
  <div id="sheet" role="dialog" aria-modal="true"></div>
</div>
<div id="toast" role="status"></div>

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const LBKG=2.20462;
const unit=()=>state.settings.units==='kg'?'kg':'lb';
const dispW=lbs=>state.settings.units==='kg'?lbs/LBKG:lbs;            // canonical lbs -> display
const toCanon=d=>state.settings.units==='kg'?d*LBKG:d;                // display -> canonical lbs
const rnd=v=>Math.round(v*10)/10;
const fmtN=v=>{v=rnd(v);return (v%1===0)?String(v):v.toFixed(1);};
const fmtW=lbs=>fmtN(dispW(lbs))+' '+unit();
const roundInc=v=>{const s=state.settings.units==='kg'?1.25:2.5;return Math.round(v/s)*s;};
const allEx=()=>LIB.concat(state.custom);
const getEx=id=>allEx().find(e=>e.id===id);
const fmtDate=iso=>new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'});
const fmtDateY=iso=>new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
const dkey=d=>{const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');};
const fromDateInput=s=>new Date(s+'T12:00:00').toISOString();
const epley=(w,r)=>r>0?w*(1+r/30):0;
const fmtSec=s=>s>=60?Math.floor(s/60)+':'+String(s%60).padStart(2,'0'):s+'s';
const setStr=(ex,s)=>(s.w>0?fmtN(dispW(s.w)):'bw')+'×'+(ex&&ex.t?fmtSec(s.r):s.r);
const planCount=p=>p.sections?p.sections.reduce((a,s)=>a+s.exs.length,0):(p.exs||[]).length;
function lastStr(e){
  const lp=lastPerf(e.id); if(!lp)return '';
  const top=Math.max(...lp.sets.map(s=>s.w));
  if(top>0)return fmtW(top);
  const br=Math.max(...lp.sets.map(s=>s.r));
  return e.t?fmtSec(br):'bw×'+br;
}
const fmtVol=lbs=>{const v=dispW(lbs);return v>=10000?(v/1000).toFixed(1)+'k':fmtN(Math.round(v));};

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2000);}

function doneSets(en){return en.sets.filter(s=>s.done&&(s.w>0||s.r>0));}
function sortedWorkouts(){return state.workouts.slice().sort((a,b)=>b.date<a.date?-1:1);}
function lastPerf(exId){
  for(const w of sortedWorkouts()){
    if(state.active&&state.active.editing===w.id)continue; // don't compare an edit against itself
    const en=w.entries.find(e=>e.ex===exId);
    if(en){const s=doneSets(en); if(s.length)return{date:w.date,sets:s};}
  }
  return null;
}
function recommend(ex){
  const lp=lastPerf(ex.id);
  if(!lp)return{w:0,note:'First time — start light',cls:'neutral'};
  const top=Math.max(...lp.sets.map(s=>s.w));
  if(ex.t){const br=Math.max(...lp.sets.map(s=>s.r));
    return{w:top,note:'Beat '+fmtSec(br)+(top>0?' @ '+fmtW(top):''),cls:''};}
  if(top===0){const br=Math.max(...lp.sets.map(s=>s.r));
    return{w:0,note:'Beat '+br+' reps',cls:''};}
  const allHit=lp.sets.every(s=>s.r>=8);
  if(!allHit)return{w:top,note:'Repeat '+fmtW(top)+' — chase 8s',cls:'neutral'};
  const lower=ex.r==='L';
  const incD=state.settings.units==='kg'?(lower?5:2.5):(lower?10:5);
  const newD=roundInc(dispW(top)+incD);
  return{w:toCanon(newD),note:'Move up: '+fmtN(newD)+' '+unit(),cls:''};
}
function bestMetric(exId,fn,excludeId){
  let best=0;
  for(const w of state.workouts){ if(w.id===excludeId)continue;
    const en=w.entries.find(e=>e.ex===exId); if(!en)continue;
    for(const s of doneSets(en))best=Math.max(best,fn(s));
  }
  return best;
}
const bestEpley=(exId,excludeId)=>bestMetric(exId,s=>epley(s.w,s.r),excludeId);
function prevLine(exId){
  const lp=lastPerf(exId); if(!lp)return '';
  const ex=getEx(exId);
  const parts=lp.sets.map(s=>setStr(ex,s)).join(' · ');
  return 'Last ('+fmtDate(lp.date)+'): '+parts;
}

function assignGroups(structId,n){
  if(structId==='superset')return Array.from({length:n},(_,i)=>String.fromCharCode(65+Math.floor(i/2))+(i%2+1));
  if(structId==='giant')return Array.from({length:n},(_,i)=>String.fromCharCode(65+Math.floor(i/3))+(i%3+1));
  if(structId==='circuit'||structId==='hiit'||structId==='emom')return Array.from({length:n},()=> 'ROUND');
  return Array.from({length:n},()=> '');
}
function entriesFromSections(secs){
  const entries=[];
  for(const s of secs){
    const gs=assignGroups(s.kind,s.exs.length);
    s.exs.forEach((id,i)=>{const en=makeEntry(id,gs[i]);if(en){en.sec=s.kind;entries.push(en);}});
  }
  return entries;
}
function buildWorkout(mode,dateStr){
  const b=UI.builder;
  if(b.addMode&&state.active){ // append to running workout
    const lastEn=state.active.entries[state.active.entries.length-1];
    for(const id of b.sel){const en=makeEntry(id,'');
      if(en){if(lastEn&&lastEn.sec)en.sec=lastEn.sec;state.active.entries.push(en);}}
    save();closeSheet();render();return;
  }
  const t=TYPES.find(x=>x.id===b.type)||TYPES[4];
  const secs=b.sections.filter(s=>s.exs.length);
  if(!secs.length){toast('Add at least one exercise');return;}
  const kinds=[...new Set(secs.map(s=>s.kind))];
  const name=t.name+(kinds.length===1&&kinds[0]!=='straight'?' · '+secName(kinds[0]):'');
  if(mode==='plan'){
    state.planned.push({id:'p'+Date.now(),date:fromDateInput(dateStr),name,type:t.id,
      sections:secs.map(s=>({kind:s.kind,exs:s.exs.slice()}))});
    state.planned.sort((a,c)=>a.date<c.date?-1:1);
    save();closeSheet();UI.tab='home';UI.mode=null;render();
    toast('Scheduled for '+fmtDate(fromDateInput(dateStr)));return;
  }
  state.active={id:'w'+Date.now(),date:mode==='past'?fromDateInput(dateStr):new Date().toISOString(),
    startedAt:Date.now(),past:mode==='past'||undefined,name,type:t.id,
    entries:entriesFromSections(secs)};
  save();closeSheet();UI.mode='workout';render();
}
function startPlanned(id){
  const p=state.planned.find(x=>x.id===id); if(!p)return;
  const secs=p.sections||[{kind:p.struct||'straight',exs:p.exs||[]}];
  state.planned=state.planned.filter(x=>x.id!==id);
  state.active={id:'w'+Date.now(),date:new Date().toISOString(),startedAt:Date.now(),
    name:p.name,type:p.type,entries:entriesFromSections(secs)};
  save();closeSheet();UI.mode='workout';render();
}
function makeEntry(exId,group){
  const ex=getEx(exId); if(!ex)return null;
  const lp=lastPerf(exId),rec=recommend(ex);
  const n=lp?Math.min(Math.max(lp.sets.length,2),6):3;
  const sets=Array.from({length:n},(_,k)=>({w:rec.w,r:lp&&lp.sets[k]?lp.sets[k].r:(ex.t?30:8),done:false}));
  return{ex:exId,group:group||'',sets};
}

function finishWorkout(){
  const a=state.active;
  const kept=a.entries.filter(en=>doneSets(en).length);
  if(!kept.length){
    openSheet(`<div class="grab"></div><h2 class="display" style="margin-bottom:8px">No sets logged</h2>
      <p class="muted" style="margin:0 0 16px">Nothing was checked off. Discard this workout, or go back and log your sets.</p>
      <div class="stack"><button class="btn danger" data-action="discard">Discard workout</button>
      <button class="btn ghost" data-action="close-sheet">Keep going</button></div>`);
    return;
  }
  const vol=kept.reduce((acc,en)=>{const ex=getEx(en.ex);
    if(ex&&ex.t)return acc; // time-based work doesn't count toward lifted volume
    return acc+doneSets(en).reduce((b,s)=>b+s.w*s.r,0);},0);
  const prs=[];
  for(const en of kept){
    const ex=getEx(en.ex);if(!ex)continue;
    const fn=ex.t?(s=>s.r):(s=>epley(s.w,s.r));
    const before=bestMetric(en.ex,fn,a.editing);
    const now=Math.max(...doneSets(en).map(fn));
    if(before>0&&now>before)prs.push(ex.name);
  }
  const durMin=a.editing?(a.dur||null):(a.past?null:Math.max(1,Math.round((Date.now()-a.startedAt)/60000)));
  const nSets=kept.reduce((acc,en)=>acc+doneSets(en).length,0);
  a._pending={vol,prs,durMin};
  openSheet(`<div class="grab"></div>
    <div class="eyebrow">${a.editing?'Editing · saves to '+fmtDateY(a.date):a.past?'Logged for '+fmtDateY(a.date):'Nice work'}</div><h2 class="display" style="margin:4px 0 14px">${esc(a.name)}</h2>

      <div class="tile"><div class="v">${durMin==null?'—':durMin}</div><div class="u">minutes</div></div>
      <div class="tile"><div class="v">${nSets}</div><div class="u">sets</div></div>
      <div class="tile"><div class="v">${fmtVol(vol)}</div><div class="u">${unit()} volume</div></div>
    </div>

      <button class="btn primary" data-action="save-workout">Save workout</button>
      <button class="btn ghost" data-action="close-sheet">Back to logging</button>
      <button class="btn danger" data-action="discard">Discard</button>
    </div>`);
}

/* ============ chart engine (single-series line) ============ */
const CHARTS={};
function lineChart(id,data,color,unitLabel){
  if(!data.length)return `<div class="chart-empty">Log a few sessions and the trend shows up here.</div>`;
  const W=340,H=180,L=40,R=14,T=16,B=24;
  const vs=data.map(d=>d.v),xs=data.map(d=>d.t);
  let vmin=Math.min(...vs),vmax=Math.max(...vs);
  if(vmin===vmax){const p=Math.max(1,vmin*.06);vmin-=p;vmax+=p;}
  const pad=(vmax-vmin)*.14;vmin-=pad;vmax+=pad;
  if(vmin<0&&Math.min(...vs)>=0)vmin=0;
  const tmin=Math.min(...xs),tmax=Math.max(...xs);
  const X=t=>data.length===1?L+(W-L-R)/2:L+(t-tmin)/(tmax-tmin||1)*(W-L-R);
  const Y=v=>T+(1-(v-vmin)/(vmax-vmin))*(H-T-B);
  const pts=data.map(d=>[X(d.t),Y(d.v)]);
  let grid='';
  for(let i=0;i<3;i++){
    const v=vmin+(vmax-vmin)*(0.18+0.32*i),y=Y(v).toFixed(1);
    grid+=`<line x1="${L}" x2="${W-R}" y1="${y}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${L-6}" y="${+y+3.5}" text-anchor="end" font-size="10" fill="var(--ink3)" style="font-variant-numeric:tabular-nums">${fmtN(v)}</text>`;
  }
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join('');
  const last=pts[pts.length-1];
  const area=data.length>1?`<path d="${line}L${last[0].toFixed(1)} ${H-B}L${pts[0][0].toFixed(1)} ${H-B}Z" fill="url(#g-${id})" opacity="0.35"/>`:'';
  const xlab=`<text x="${pts[0][0].toFixed(1)}" y="${H-7}" font-size="10" fill="var(--ink3)" text-anchor="${data.length===1?'middle':'start'}">${fmtDate(new Date(tmin).toISOString())}</text>`+
    (data.length>1?`<text x="${last[0].toFixed(1)}" y="${H-7}" font-size="10" fill="var(--ink3)" text-anchor="end">${fmtDate(new Date(tmax).toISOString())}</text>`:'');
  CHARTS[id]={data,pts,W,unitLabel};
  return `<div class="chart" data-chartid="${id}">
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Trend chart, ${data.length} points">
      <defs><linearGradient id="g-${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${color}" stop-opacity="0.7"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
      ${grid}${area}
      ${data.length>1?`<path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:''}
      ${pts.length<=14?pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${color}" stroke="var(--card)" stroke-width="2"/>`).join(''):''}
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4.5" fill="${color}" stroke="var(--bg)" stroke-width="2"/>
      <line id="cl-${id}" x1="0" x2="0" y1="${T}" y2="${H-B}" stroke="var(--ink3)" stroke-width="1" stroke-dasharray="3 3" visibility="hidden"/>
      <circle id="cd-${id}" r="4.5" fill="${color}" stroke="var(--bg)" stroke-width="2" visibility="hidden"/>
      ${xlab}
    </svg>
    <div class="ctip" hidden></div>
  </div>`;
}
function chartHover(e){
  const wrap=e.target.closest('.chart'); if(!wrap)return;
  const c=CHARTS[wrap.dataset.chartid]; if(!c||c.data.length===0)return;
  const svg=wrap.querySelector('svg'),tip=wrap.querySelector('.ctip');
  const rect=svg.getBoundingClientRect();
  const xv=(e.clientX-rect.left)/rect.width*c.W;
  let bi=0,bd=1e9;
  c.pts.forEach((p,i)=>{const d=Math.abs(p[0]-xv);if(d<bd){bd=d;bi=i;}});
  const p=c.pts[bi],d=c.data[bi];
  const cl=svg.querySelector('[id^=cl-]'),cd=svg.querySelector('[id^=cd-]');
  cl.setAttribute('x1',p[0]);cl.setAttribute('x2',p[0]);cl.setAttribute('visibility','visible');
  cd.setAttribute('cx',p[0]);cd.setAttribute('cy',p[1]);cd.setAttribute('visibility','visible');
  tip.hidden=false;
  tip.innerHTML=`<div class="muted">${fmtDate(new Date(d.t).toISOString())}</div><div class="cv num">${fmtN(d.v)} ${c.unitLabel}</div>`;
  const px=p[0]/c.W*rect.width;
  tip.style.left=Math.max(46,Math.min(rect.width-46,px))+'px';
  tip.style.top=(p[1]/180*rect.height)+'px';
}
function chartLeave(e){
  const wrap=e.target.closest('.chart'); if(!wrap)return;
  wrap.querySelector('.ctip').hidden=true;
  wrap.querySelectorAll('[visibility]').forEach(el=>el.setAttribute('visibility','hidden'));
}

/* ============ rest + elapsed timers ============ */
let restEnd=0,restRepeat=false;
function startRest(sec,rep){restEnd=Date.now()+sec*1000;restRepeat=!!rep;$('#restpill').hidden=false;tickRest();}
function tickRest(){
  if(!restEnd)return;
  const left=Math.ceil((restEnd-Date.now())/1000);
  if(left<=0){
    if(navigator.vibrate)navigator.vibrate([160,80,160]);
    if(restRepeat){restEnd+=60000;toast('New minute — go');tickRest();return;}
    restEnd=0;$('#restpill').hidden=true;toast('Rest over — go');return;}
  $('#restt').textContent=(restRepeat?'EMOM ':'')+Math.floor(left/60)+':'+String(left%60).padStart(2,'0');
}
setInterval(()=>{tickRest();
  const el=$('#elapsed'); if(el&&state.active)el.textContent=elapsedStr();},500);

/* ============ mutations ============ */
function setVal(ei,si,field,raw){
  const en=state.active&&state.active.entries[ei]; if(!en||!en.sets[si])return;
  const v=parseFloat(raw);
  if(field==='w')en.sets[si].w=isNaN(v)||v<0?0:toCanon(v);
  else en.sets[si].r=isNaN(v)||v<0?0:Math.round(v);
  save();
}
function armed(el,label){ // two-tap confirm
  if(el.dataset.armed){delete el.dataset.armed;return true;}
  el.dataset.armed='1';const old=el.textContent;el.textContent='Tap again to confirm';
  setTimeout(()=>{if(el.isConnected&&el.dataset.armed){delete el.dataset.armed;el.textContent=old;}},2600);
  return false;
}

    if(state.active){toast('Finish or discard your current workout first');return;}
    const w=state.workouts.find(x=>x.id===el.dataset.id); if(!w)return;
    state.active=JSON.parse(JSON.stringify(w));
    state.active.editing=w.id;
    state.active.startedAt=Date.now();
    save();closeSheet();UI.mode='workout';render();},
  'w-copy':el=>{
    const w=state.workouts.find(x=>x.id===el.dataset.id); if(!w)return;
    const secs=[];let cur=null;
    for(const en of w.entries){ if(!getEx(en.ex))continue;
      const kind=en.sec||w.struct||'straight';
      if(!cur||cur.kind!==kind){cur={kind,exs:[]};secs.push(cur);}
      cur.exs.push(en.ex);}
    if(!secs.length){toast('Those exercises no longer exist');return;}
    UI.builder={step:4,type:w.type||'full',sections:secs,cur:null,sel:[],q:'',eq:'',addMode:false,presetDate:''};
    openSheet(builderHTML());},
  'cal-prev':()=>{UI.cal.m--;if(UI.cal.m<0){UI.cal.m=11;UI.cal.y--;}render();},
  'cal-next':()=>{UI.cal.m++;if(UI.cal.m>11){UI.cal.m=0;UI.cal.y++;}render();},
  'cal-day':el=>openSheet(dayHTML(el.dataset.date)),
  'day-log':el=>{const d=el.dataset.date;openBuilder(false);UI.builder.presetDate=d;},
  'del-workout':el=>{if(!armed(el))return;
    state.workouts=state.workouts.filter(w=>w.id!==el.dataset.id);
    save();closeSheet();render();toast('Workout deleted');},
  'bw-save':()=>{
    const v=parseFloat($('#bw-in').value);
    if(isNaN(v)||v<=0){toast('Enter a weight first');return;}
    state.bodyweight.push({date:new Date().toISOString(),w:toCanon(v)});
    save();render();toast('Body weight logged');},
  'del-bw':el=>{state.bodyweight=state.bodyweight.filter(x=>x.date!==el.dataset.id);save();render();},
  units:el=>{state.settings.units=el.dataset.id;save();render();openSheet(settingsHTML(),'settings');},
  machines:el=>{state.settings.hideMachines=el.dataset.id==='hide';save();openSheet(settingsHTML(),'settings');},
  export:()=>{
    const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='liftlab-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);},
  wipe:el=>{if(!armed(el))return;
    state=blank();save();closeSheet();render();toast('All data erased');},
};
function importFile(e){
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
      const d=JSON.parse(rd.result);
      if(!Array.isArray(d.workouts))throw 0;
      state=Object.assign(blank(),d);save();closeSheet();render();toast('Backup imported');
    }catch(_){toast('That file is not a LiftLab backup');}};
  rd.readAsText(f);
}

/* ============ wiring ============ */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(el&&ACT[el.dataset.action])ACT[el.dataset.action](el,e);
});
document.addEventListener('input',e=>{
  const el=e.target,f=el.dataset&&el.dataset.field;
  if(!f)return;
  if(f==='w'||f==='r')setVal(el.dataset.ei,el.dataset.si,f,el.value);
  else if(f==='wnotes'){if(state.active){state.active.notes=el.value;save();}}
  else if(f==='b-q'){UI.builder.q=el.value;const l=$('#pickerlist');if(l)l.innerHTML=pickerListHTML();}
  else if(f==='exq'){UI.exq=el.value;const l=$('#exlist');if(l)l.innerHTML=exListHTML();}
});
document.addEventListener('pointermove',chartHover);
document.addEventListener('pointerdown',chartHover);
document.addEventListener('pointerout',chartLeave);
window.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('#sheetwrap').hidden)closeSheet();});

render();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
